{{define "scenario-row"}}
<tr id="scenario-{{.ID}}">
  <td>{{.ID}}</td>
  <td>{{.Name}}</td>
  <td><span class="badge {{.StatusClass}}">{{.Status}}</span></td>
  <td>{{.Profile.WorkloadType}}</td>
  <td>{{.CreatedAt.Format "2006-01-02 15:04:05"}}</td>
  <td>
    <button class="btn" hx-post="/scenarios/{{.ID}}/stop" hx-target="#scenario-{{.ID}}" hx-swap="outerHTML">Stop</button>
  </td>
</tr>
{{end}}

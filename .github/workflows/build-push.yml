name: build-push

on:
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        service: [api, worker, ui]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get secrets from Bitwarden
        uses: bitwarden/sm-action@v1
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            a35d32e4-fc58-4d80-a927-b35400c210f7 > DOCKERHUB_USERNAME
            5f8b4016-fb5d-45fc-9e13-b35400be5c46 > DOCKERHUB_SECRET

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_SECRET }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/clusterprobe-${{ matrix.service }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/clusterprobe-${{ matrix.service }}:${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

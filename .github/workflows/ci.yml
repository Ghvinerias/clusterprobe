name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test
        run: go test ./... -race -coverprofile=coverage.out
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
      - name: Helm lint
        run: helm lint deploy/helm/clusterprobe

  kustomize-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
      - uses: azure/setup-kubectl@v4
      - uses: imranismail/setup-kustomize@v2
      - name: Validate self-contained
        run: kustomize build --load-restrictor LoadRestrictionsNone deploy/kustomize/overlays/self-contained | kubectl apply --dry-run=client --validate=false -f -
      - name: Validate existing-stack
        run: kustomize build --load-restrictor LoadRestrictionsNone deploy/kustomize/overlays/existing-stack | kubectl apply --dry-run=client --validate=false -f -

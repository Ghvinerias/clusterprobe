apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ../../../../manifests/observability/alloy/alloy-serviceaccount.yaml
  - ../../../../manifests/observability/alloy/alloy-clusterrole.yaml
  - ../../../../manifests/observability/alloy/alloy-clusterrolebinding.yaml
  - ../../../../manifests/observability/alloy/alloy-daemonset.yaml
  - ../../../../manifests/observability/alloy/alloy-service.yaml
  - ../../../../manifests/observability/alloy/alloy-configmap.yaml
  - ../../../../manifests/observability/prometheus/prometheus-configmap.yaml
  - ../../../../manifests/observability/prometheus/prometheus-rules.yaml
  - ../../../../manifests/observability/prometheus/prometheus-pvc.yaml
  - ../../../../manifests/observability/prometheus/prometheus-statefulset.yaml
  - ../../../../manifests/observability/prometheus/prometheus-service.yaml
  - ../../../../manifests/observability/loki/loki-configmap.yaml
  - ../../../../manifests/observability/loki/loki-pvc.yaml
  - ../../../../manifests/observability/loki/loki-statefulset.yaml
  - ../../../../manifests/observability/loki/loki-service.yaml
  - ../../../../manifests/observability/tempo/tempo-configmap.yaml
  - ../../../../manifests/observability/tempo/tempo-pvc.yaml
  - ../../../../manifests/observability/tempo/tempo-deployment.yaml
  - ../../../../manifests/observability/tempo/tempo-service.yaml
  - ../../../../manifests/observability/grafana/grafana-ini-configmap.yaml
  - ../../../../manifests/observability/grafana/grafana-datasources.yaml
  - ../../../../manifests/observability/grafana/grafana-dashboards-provider.yaml
  - ../../../../manifests/observability/grafana/grafana-secret.yaml
  - ../../../../manifests/observability/grafana/grafana-pvc.yaml
  - ../../../../manifests/observability/grafana/grafana-deployment.yaml
  - ../../../../manifests/observability/grafana/grafana-service.yaml
  - ../../../../manifests/observability/grafana/grafana-ingress.yaml
  - ../../../../manifests/observability/grafana/dashboards/overview-configmap.yaml
  - ../../../../manifests/observability/grafana/dashboards/workloads-configmap.yaml
  - ../../../../manifests/observability/grafana/dashboards/chaos-configmap.yaml
  - ../../../../manifests/observability/grafana/dashboards/traces-configmap.yaml
  - ../../../../manifests/chaos-mesh/chaos-mesh-crds.yaml
  - ../../../../manifests/chaos-mesh/chaos-mesh-controller.yaml
  - ../../../../manifests/chaos-mesh/chaos-mesh-daemon.yaml
  - ../../../../manifests/chaos-mesh/chaos-mesh-api-rbac.yaml
configMapGenerator:
  - name: clusterprobe-alloy-config
    behavior: replace
    files:
      - config.river=alloy-config.river
patchesStrategicMerge:
  - patch-api-replicas.yaml
  - patch-worker-replicas.yaml
  - patch-ui-replicas.yaml

images:
  - name: clusterprobe-api
    newName: docker.io/slickg/clusterprobe-api
    newTag: latest
  - name: clusterprobe-worker
    newName: docker.io/slickg/clusterprobe-worker
    newTag: latest
  - name: clusterprobe-ui
    newName: docker.io/slickg/clusterprobe-ui
    newTag: latest

{{- if .Values.observability.selfContained }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clusterprobe.componentName" (dict "root" . "component" "grafana") }}-dashboards-provider
  namespace: {{ include "clusterprobe.namespace" . }}
  labels:
    {{- include "clusterprobe.componentLabels" (dict "root" . "component" "grafana") | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: clusterprobe
        orgId: 1
        folder: "ClusterProbe"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
{{- end }}

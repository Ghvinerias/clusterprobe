apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clusterprobe.componentName" (dict "root" . "component" "alloy") }}-config
  namespace: {{ include "clusterprobe.namespace" . }}
  labels:
    {{- include "clusterprobe.componentLabels" (dict "root" . "component" "alloy") | nindent 4 }}
data:
  config.river: |
    logging {
      level = "info"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component"]
        target_label  = "service"
      }

      rule {
        target_label = "cluster"
        replacement  = env("CLUSTER_NAME")
      }
    }

    loki.write "default" {
      endpoint {
        url = env("LOKI_URL")
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.default.receiver]
    }

    prometheus.remote_write "default" {
      endpoint {
        url = env("PROM_REMOTE_WRITE_URL")
      }
    }

    prometheus.scrape "clusterprobe" {
      targets = [
        { __address__ = "{{ include "clusterprobe.componentName" (dict "root" . "component" "api") }}:{{ .Values.api.service.port }}", job = "clusterprobe-api" },
        { __address__ = "{{ include "clusterprobe.componentName" (dict "root" . "component" "worker") }}:{{ .Values.worker.service.port }}", job = "clusterprobe-worker" },
        { __address__ = "{{ include "clusterprobe.componentName" (dict "root" . "component" "ui") }}:{{ .Values.ui.service.port }}", job = "clusterprobe-ui" },
      ]
      forward_to = [prometheus.remote_write.default.receiver]
    }

    prometheus.scrape "kube-state-metrics" {
      targets = [{ __address__ = "kube-state-metrics:8080", job = "kube-state-metrics" }]
      forward_to = [prometheus.remote_write.default.receiver]
    }

    prometheus.scrape "node-exporter" {
      targets = [{ __address__ = "node-exporter:9100", job = "node-exporter" }]
      forward_to = [prometheus.remote_write.default.receiver]
    }

    otelcol.receiver.otlp "default" {
      grpc {
        endpoint = "0.0.0.0:4317"
      }
      http {
        endpoint = "0.0.0.0:4318"
      }
      output {
        traces  = [otelcol.exporter.otlp.tempo.input]
        metrics = [otelcol.exporter.prometheusremotewrite.metrics.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      endpoint = env("TEMPO_OTLP_ENDPOINT")
      tls {
        insecure = true
      }
    }

    otelcol.exporter.prometheusremotewrite "metrics" {
      endpoint = env("PROM_REMOTE_WRITE_URL")
    }

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clusterprobe.componentName" (dict "root" . "component" "alloy") }}
  namespace: {{ include "clusterprobe.namespace" . }}
  labels:
    {{- include "clusterprobe.componentLabels" (dict "root" . "component" "alloy") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "clusterprobe.componentName" (dict "root" . "component" "alloy") }}
  labels:
    {{- include "clusterprobe.componentLabels" (dict "root" . "component" "alloy") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "clusterprobe.componentName" (dict "root" . "component" "alloy") }}
  labels:
    {{- include "clusterprobe.componentLabels" (dict "root" . "component" "alloy") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "clusterprobe.componentName" (dict "root" . "component" "alloy") }}
subjects:
  - kind: ServiceAccount
    name: {{ include "clusterprobe.componentName" (dict "root" . "component" "alloy") }}
    namespace: {{ include "clusterprobe.namespace" . }}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clusterprobe-self-contained
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ghvinerias/clusterprobe
    targetRevision: main
    path: deploy/kustomize/overlays/self-contained
  destination:
    server: https://kubernetes.default.svc
    namespace: cluster-probe
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

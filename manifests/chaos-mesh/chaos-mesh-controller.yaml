apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-mesh-controller
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: chaos-mesh
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaos-mesh-controller
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: chaos-mesh
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["chaos-mesh.org"]
    resources: ["*", "*/*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-mesh-controller
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: chaos-mesh
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chaos-mesh-controller
subjects:
  - kind: ServiceAccount
    name: chaos-mesh-controller
    namespace: cluster-probe
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-mesh-controller
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: chaos-mesh
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterprobe
      app.kubernetes.io/component: chaos-mesh
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterprobe
        app.kubernetes.io/component: chaos-mesh
        app.kubernetes.io/part-of: clusterprobe
    spec:
      serviceAccountName: chaos-mesh-controller
      containers:
        - name: controller-manager
          image: ghcr.io/chaos-mesh/chaos-mesh:v2.8.1
          imagePullPolicy: IfNotPresent
          args:
            - controller-manager
            - --leader-elect=true
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ENABLE_FILTER_NAMESPACE
              value: "true"
          ports:
            - name: http
              containerPort: 10080

apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-mesh-daemon
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: chaos-mesh
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaos-mesh-daemon
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: chaos-mesh
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-mesh-daemon
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: chaos-mesh
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chaos-mesh-daemon
subjects:
  - kind: ServiceAccount
    name: chaos-mesh-daemon
    namespace: cluster-probe
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: chaos-mesh-daemon
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: chaos-mesh
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterprobe
      app.kubernetes.io/component: chaos-mesh
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterprobe
        app.kubernetes.io/component: chaos-mesh
        app.kubernetes.io/part-of: clusterprobe
    spec:
      serviceAccountName: chaos-mesh-daemon
      hostPID: true
      containers:
        - name: chaos-daemon
          image: ghcr.io/chaos-mesh/chaos-daemon:v2.8.1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
            - name: grpc
              containerPort: 31767
          volumeMounts:
            - name: dockersock
              mountPath: /var/run/docker.sock
            - name: sysfs
              mountPath: /sys
            - name: procfs
              mountPath: /proc
      volumes:
        - name: dockersock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: sysfs
          hostPath:
            path: /sys
            type: Directory
        - name: procfs
          hostPath:
            path: /proc
            type: Directory

# What it tests: Worker CPU saturation behavior.
# Success looks like: throughput drops but workers stay responsive.
# Dashboard: ClusterProbe Workloads.
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: cpu-stress-workers
  namespace: cluster-probe
spec:
  mode: all
  selector:
    namespaces:
      - cluster-probe
    labelSelectors:
      app.kubernetes.io/component: worker
  stressors:
    cpu:
      workers: 2
      load: 100
  duration: "3m"

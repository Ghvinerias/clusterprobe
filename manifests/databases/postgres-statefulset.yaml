apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clusterprobe-postgres
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  serviceName: clusterprobe-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterprobe
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterprobe
        app.kubernetes.io/component: postgres
        app.kubernetes.io/part-of: clusterprobe
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: clusterprobe-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clusterprobe-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: clusterprobe-postgres-secret
                  key: POSTGRES_DB
          args:
            - "-c"
            - "hba_file=/etc/postgresql/pg_hba.conf"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
      volumes:
        - name: config
          configMap:
            name: clusterprobe-postgres-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: clusterprobe
          app.kubernetes.io/component: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi

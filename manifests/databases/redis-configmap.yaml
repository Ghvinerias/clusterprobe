apiVersion: v1
kind: ConfigMap
metadata:
  name: clusterprobe-redis-config
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    protected-mode no
    save ""
    appendonly yes

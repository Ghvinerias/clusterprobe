apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clusterprobe-mongo
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: mongo
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  serviceName: clusterprobe-mongo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterprobe
      app.kubernetes.io/component: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterprobe
        app.kubernetes.io/component: mongo
        app.kubernetes.io/part-of: clusterprobe
    spec:
      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: clusterprobe-mongo-secret
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clusterprobe-mongo-secret
                  key: MONGO_INITDB_ROOT_PASSWORD
          args:
            - "--config=/etc/mongo/mongod.conf"
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: config
              mountPath: /etc/mongo/mongod.conf
              subPath: mongod.conf
      volumes:
        - name: config
          configMap:
            name: clusterprobe-mongo-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: clusterprobe
          app.kubernetes.io/component: mongo
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi

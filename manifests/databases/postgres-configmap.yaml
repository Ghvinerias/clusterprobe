apiVersion: v1
kind: ConfigMap
metadata:
  name: clusterprobe-postgres-config
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: postgres
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
data:
  pg_hba.conf: |
    local all all trust
    host all all 0.0.0.0/0 md5
    host all all ::/0 md5

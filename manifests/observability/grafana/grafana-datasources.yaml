apiVersion: v1
kind: ConfigMap
metadata:
  name: clusterprobe-grafana-datasources
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: grafana
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://clusterprobe-prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://clusterprobe-loki:3100
      - name: Tempo
        type: tempo
        access: proxy
        url: http://clusterprobe-tempo:3200
        jsonData:
          tracesToLogs:
            datasourceUid: loki
            tags: ["service", "pod"]
            mappedTags: [{ key: "service", value: "service" }]
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            filterByTraceID: true
            filterBySpanID: false

apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterprobe-grafana
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: grafana
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterprobe
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterprobe
        app.kubernetes.io/component: grafana
        app.kubernetes.io/part-of: clusterprobe
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: grafana-admin
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clusterprobe-grafana-data
        - name: config
          configMap:
            name: clusterprobe-grafana-config
        - name: datasources
          configMap:
            name: clusterprobe-grafana-datasources
        - name: dashboards-provider
          configMap:
            name: clusterprobe-grafana-dashboards-provider
        - name: dashboards
          projected:
            sources:
              - configMap:
                  name: clusterprobe-dashboard-overview
              - configMap:
                  name: clusterprobe-dashboard-workloads
              - configMap:
                  name: clusterprobe-dashboard-chaos
              - configMap:
                  name: clusterprobe-dashboard-traces

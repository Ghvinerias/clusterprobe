apiVersion: v1
kind: ConfigMap
metadata:
  name: clusterprobe-grafana-dashboards-provider
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: grafana
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: clusterprobe
        orgId: 1
        folder: ClusterProbe
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

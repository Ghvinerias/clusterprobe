apiVersion: v1
kind: Service
metadata:
  name: clusterprobe-alloy
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: alloy
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: http
      port: 12345
      targetPort: http
  selector:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: alloy

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: clusterprobe-alloy
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: alloy
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterprobe
      app.kubernetes.io/component: alloy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterprobe
        app.kubernetes.io/component: alloy
        app.kubernetes.io/part-of: clusterprobe
    spec:
      serviceAccountName: clusterprobe-alloy
      containers:
        - name: alloy
          image: grafana/alloy:latest
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /etc/alloy/config.river
            - --server.http.listen-addr=0.0.0.0:12345
          env:
            - name: CLUSTER_NAME
              value: clusterprobe
            - name: PROM_REMOTE_WRITE_URL
              value: http://clusterprobe-prometheus:9090/api/v1/write
            - name: LOKI_URL
              value: http://clusterprobe-loki:3100/loki/api/v1/push
            - name: TEMPO_OTLP_ENDPOINT
              value: clusterprobe-tempo:4317
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: http
              containerPort: 12345
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: clusterprobe-alloy-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: Directory

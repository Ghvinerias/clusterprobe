apiVersion: v1
kind: ConfigMap
metadata:
  name: clusterprobe-prometheus-rules
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: prometheus
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
data:
  rules.yml: |
    groups:
      - name: clusterprobe.rules
        rules:
          - record: cp:ops:rate5m
            expr: rate(cp_ops_total[5m])
          - record: cp:error:rate5m
            expr: rate(cp_errors_total[5m])
          - record: cp:latency:p99
            expr: histogram_quantile(0.99, sum(rate(cp_workload_duration_seconds_bucket[5m])) by (le))

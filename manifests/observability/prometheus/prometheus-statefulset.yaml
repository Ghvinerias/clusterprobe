apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clusterprobe-prometheus
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: prometheus
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  serviceName: clusterprobe-prometheus
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterprobe
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterprobe
        app.kubernetes.io/component: prometheus
        app.kubernetes.io/part-of: clusterprobe
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-remote-write-receiver
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: clusterprobe-prometheus-config
        - name: rules
          configMap:
            name: clusterprobe-prometheus-rules
        - name: data
          persistentVolumeClaim:
            claimName: clusterprobe-prometheus-data

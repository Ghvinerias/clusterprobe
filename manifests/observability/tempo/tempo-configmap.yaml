apiVersion: v1
kind: ConfigMap
metadata:
  name: clusterprobe-tempo-config
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: tempo
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1000000
      max_block_duration: 5m

    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks

    compactor:
      compaction:
        block_retention: 24h

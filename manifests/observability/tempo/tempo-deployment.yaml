apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterprobe-tempo
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: tempo
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterprobe
      app.kubernetes.io/component: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterprobe
        app.kubernetes.io/component: tempo
        app.kubernetes.io/part-of: clusterprobe
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.6.1
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
            - name: http
              containerPort: 3200
            - name: otlp-grpc
              containerPort: 4317
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: clusterprobe-tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: clusterprobe-tempo-data

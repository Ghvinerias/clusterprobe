apiVersion: v1
kind: ConfigMap
metadata:
  name: clusterprobe-loki-config
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: loki
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /var/loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      filesystem:
        directory: /var/loki/chunks

    limits_config:
      retention_period: 168h

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clusterprobe-api
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clusterprobe-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

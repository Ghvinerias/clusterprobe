apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterprobe-api
  labels:
    app.kubernetes.io/name: clusterprobe
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: clusterprobe
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterprobe
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterprobe
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: clusterprobe
    spec:
      serviceAccountName: clusterprobe-api
      containers:
        - name: api
          image: clusterprobe-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cp-config
            - secretRef:
                name: cp-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
